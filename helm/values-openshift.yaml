# Values for TicketCraft on OpenShift
# Usage: helm upgrade --install ticketcraft ./helm -f ./helm/values-openshift.yaml -n your-namespace

replicaCount: 1

image:
  repository: images.paas.redhat.com/unifai/ticketcraft
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels:
  paas.redhat.com/appcode: TAG-001

# IMPORTANT: OpenShift assigns these from the namespace's SCC range
podSecurityContext: {}

securityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 3001
  targetPort: 3001

env:
  GEMINI_API_KEY: ""
  GEMINI_DEFAULT_MODEL: "gemini-3.1-pro-preview"
  JIRA_BASE_URL: "https://redhat.atlassian.net"
  ADMIN_EMAILS: "osabach@redhat.com,yhabushi@redhat.com"
  PORT: "3001"
  HTTP_PORT: "3000"
  HOME: "/tmp"
  HOST: "0.0.0.0"
  SESSION_TIMEOUT_MS: "1800000"
  TRUST_PROXY: "true"
  RATE_LIMIT_MAX: "500"
  AUTOMATION_TRIGGER_LABEL: "readyForTicketCraftRefinement"
  AUTOMATION_DONE_LABEL: "processedByTicketCraft"

envSecret:
  enabled: false
  secretName: "ticketcraft-secrets"
  keys:
    - GEMINI_API_KEY

tls:
  enabled: false

persistence:
  enabled: true
  keepPvc: true
  storageClass: "aws-ebs"
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  labels:
    paas.redhat.com/appcode: TAG-001
  annotations:
    kubernetes.io/reclaimPolicy: "Delete"

# OpenShift Route
route:
  enabled: true
  host: ""
  annotations:
    haproxy.router.openshift.io/timeout: "600s"
  termination: edge
  insecureEdgeTerminationPolicy: Redirect

# Ingress disabled (using OpenShift Route)
ingress:
  enabled: false

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

healthCheck:
  enabled: true
  path: /api/health
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress: []
  egress: []

nodeSelector: {}
tolerations: []
affinity: {}
